<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoApp - Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="app-page">
    <header class="app-header">
        <div class="header-left">
            <!-- &#10003; = Unicode checkmark ✓ -->
            <h1>&#10003; TodoApp</h1>
        </div>
        <div class="header-right">
            <span id="welcome-msg"></span>
            <button id="logout-btn" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <main class="app-main">
        <div class="controls-bar">
            <div class="filters">
                <select id="filter-category" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-priority" class="filter-select">
                    <option value="">All Priorities</option>
                    <option value="Urgent">Urgent</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
                <select id="filter-completed" class="filter-select">
                    <option value="">All Tasks</option>
                    <option value="false">Active</option>
                    <option value="true">Completed</option>
                </select>
                <select id="sort-by" class="filter-select">
                    <option value="created_at">Sort: Newest</option>
                    <option value="due_date">Sort: Due Date</option>
                    <option value="priority">Sort: Priority</option>
                </select>
            </div>
            <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
        </div>

        <div id="task-stats" class="task-stats"></div>

        <div id="tasks-container" class="tasks-container">
            <div class="loading">Loading tasks...</div>
        </div>
    </main>

    <!-- Task Modal -->
    <div id="task-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Task</h2>
                <button id="modal-close" class="modal-close">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">Title *</label>
                    <input type="text" id="task-title" placeholder="Enter task title" required maxlength="200">
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" placeholder="Enter task description (optional)" rows="3" maxlength="1000"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="Other">Other</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                            <option value="High">High</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-due-date">Due Date</label>
                    <input type="date" id="task-due-date">
                </div>
                <div id="task-form-error" class="error-message hidden"></div>
                <div class="modal-footer">
                    <button type="button" id="cancel-task" class="btn btn-secondary">Cancel</button>
                    <button type="submit" id="save-task" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
            </div>
            <p>Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="modal-footer">
                <button id="cancel-delete" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
