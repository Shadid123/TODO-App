<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Todo App</h2>
            <div id="user-info"></div>
            <button onclick="logout()">Logout</button>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>My Todos</h1>
            </div>

            <!-- Add Todo Form -->
            <div class="add-todo-section">
                <h3>Add New Todo</h3>
                <input type="text" id="todo-title" placeholder="Todo title" required>
                <textarea id="todo-description" placeholder="Description"></textarea>
                <select id="todo-category">
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
                <select id="todo-priority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                    <option value="Urgent">Urgent</option>
                </select>
                <input type="date" id="todo-due-date">
                <button onclick="createTodo()">Add Todo</button>
            </div>

            <!-- Filters -->
            <div class="filters-section">
                <select id="filter-category" onchange="applyFilters()">
                    <option value="">All Categories</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
                <select id="filter-priority" onchange="applyFilters()">
                    <option value="">All Priorities</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Urgent">Urgent</option>
                </select>
                <select id="filter-status" onchange="applyFilters()">
                    <option value="">All Status</option>
                    <option value="false">Active</option>
                    <option value="true">Completed</option>
                </select>
            </div>

            <!-- Todos List -->
            <div id="todos-list" class="todos-container"></div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
